<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sara 🎉</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    background: url('images/background.jpeg') no-repeat center center fixed;
    background-size: cover;
    overflow-x: hidden;
  }
  .screen { display: none; text-align: center; padding: 20px; color: #fff; }
  .active { display: block; }
  h1 { font-size: 3em; margin: 20px 0; text-shadow: 2px 2px 5px #000; }
  p { font-size: 1.5em; margin: 10px 0; text-shadow: 1px 1px 3px #000; }
  button { padding: 10px 20px; font-size: 1.2em; border-radius: 10px; cursor: pointer; margin-top: 20px; }
  .characters img { width: 150px; margin: 10px; transition: transform 0.5s; }
  .cake-container { display:flex; justify-content:center; align-items:flex-end; gap:20px; margin-top:30px; }
  .cake-container img { width:200px; cursor:pointer; transition: transform 0.3s; }
  #candles { position:absolute; top:-20px; left:50%; transform:translateX(-50%); font-size:25px; }
  #wishInput { padding:10px; font-size:1em; border-radius:10px; width:200px; text-align:center; }
  .heart { position: fixed; color: pink; font-size: 20px; animation: float 4s linear forwards; pointer-events:none; }
  @keyframes float { 0% {transform: translateY(0) rotate(0deg);} 100% {transform: translateY(-500px) rotate(360deg); opacity:0;} }
  #shootingStar { position: absolute; width: 5px; height: 5px; background: yellow; border-radius: 50%; display:none; box-shadow: 0 0 10px 5px yellow; }
</style>
</head>
<body>

<!-- Screen 1: Opening characters -->
<div id="screen1" class="screen active">
  <h1>✨ Happy Birthday Sara! ✨</h1>
  <div class="characters">
    <img src="images/cinnamoroll1.jpeg">
    <img src="images/cinnamoroll2.jpeg">
    <img src="images/cinnamoroll3.jpeg">
    <img src="images/cinnamoroll4.jpeg">
  </div>
  <button onclick="nextScreen(2)">Tap to Start 🎀</button>
</div>

<!-- Screen 2: Messages -->
<div id="screen2" class="screen">
  <h1>🎉 Messages for you 🎉</h1>
  <p id="messageText">Get ready for a surprise...</p>
  <button onclick="showNextMessage()">Next</button>
</div>

<!-- Screen 3: Cake + dessert -->
<div id="screen3" class="screen">
  <h1>Make a wish 🎂✨</h1>
  <div class="cake-container">
    <div style="position:relative;" onclick="blowCandle()">
      <img src="images/cake.jpeg">
      <div id="candles">🔥🔥🔥</div>
    </div>
    <img src="images/dessert.jpeg">
  </div>
  <p>(Tap the cake to blow candles)</p>
</div>

<!-- Screen 4: Wish input -->
<div id="screen4" class="screen">
  <h1>Type your wish 🌠</h1>
  <input type="text" id="wishInput" placeholder="Your wish here">
  <button onclick="shootStar()">Send Wish ✨</button>
  <div id="shootingStar"></div>
</div>

<!-- Screen 5: Final hearts -->
<div id="screen5" class="screen">
  <h1>💖 All the love to you, Sara! 💖</h1>
  <p>Hope your birthday is as magical as you are! 🎀</p>
</div>

<script>
let currentScreen = 1;
let messages = ["You’re amazing!", "Hope your day is full of smiles 😊", "Here’s to a magical year ahead ✨"];
let msgIndex = 0;

function nextScreen(screenNum){
  document.getElementById('screen'+currentScreen).classList.remove('active');
  currentScreen = screenNum;
  document.getElementById('screen'+currentScreen).classList.add('active');
}

// Messages
function showNextMessage(){
  if(msgIndex < messages.length){
    document.getElementById('messageText').innerText = messages[msgIndex];
    msgIndex++;
  } else {
    nextScreen(3);
  }
}

// Cake candle
function blowCandle(){
  document.getElementById('candles').style.display = 'none';
  setTimeout(()=>{ nextScreen(4); }, 1000);
}

// Shooting star
function shootStar(){
  let star = document.getElementById('shootingStar');
  star.style.display='block';
  star.style.left = '0px';
  star.style.top = Math.random()*window.innerHeight/2 + 'px';
  let pos = 0;
  let interval = setInterval(()=>{
    if(pos > window.innerWidth){
      clearInterval(interval);
      star.style.display='none';
      nextScreen(5);
      createHearts();
    } else{
      pos+=15;
      star.style.left = pos + 'px';
    }
  }, 20);
}

// Hearts
function createHearts(){
  for(let i=0;i<30;i++){
    let heart = document.createElement('div');
    heart.className='heart';
    heart.style.left = Math.random()*window.innerWidth+'px';
    heart.style.animationDuration = (2+Math.random()*3)+'s';
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
