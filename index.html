<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sara 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat&family=Pacifico&display=swap" rel="stylesheet">
<style>
body {
  margin:0; padding:0;
  font-family: 'Caveat', cursive;
  background: url('images/background.jpeg') no-repeat center center fixed;
  background-size: cover;
  overflow-x: hidden;
  color: #fff;
}

/* Screens */
.screen { display: none; text-align:center; padding:20px; }
.active { display: block; }

/* Fonts */
h1 { font-family: 'Pacifico', cursive; font-size:4em; text-shadow: 2px 2px 15px #000; }
p { font-size:2em; text-shadow: 1px 1px 8px #000; }
button { padding:15px 30px; font-size:1.5em; border-radius:15px; cursor:pointer; margin-top:20px; }

/* Characters */
.characters img { width:160px; margin:10px; box-shadow: 0 0 40px rgba(255,255,255,0.5); border-radius:10px; }

/* Cake & dessert */
.cake-container { display:flex; justify-content:center; align-items:flex-end; gap:40px; margin-top:50px; position:relative; }
.cake-container img { width:350px; cursor:pointer; transition: transform 0.3s; border-radius:15px; }
#candles { position:absolute; top:-30px; left:50%; transform:translateX(-50%); font-size:40px; }

/* Input for wish */
#wishInput { padding:15px; font-size:1.5em; border-radius:15px; width:300px; text-align:center; }

/* Hearts */
.heart { position: fixed; color: pink; font-size: 25px; animation: float 4s linear forwards; pointer-events:none; }
@keyframes float { 0% {transform: translateY(0) rotate(0deg);} 100% {transform: translateY(-600px) rotate(360deg); opacity:0;} }

/* Shooting star */
#shootingStar { position: absolute; width: 20px; height: 20px; background: yellow; border-radius: 50%; display:none; box-shadow: 0 0 30px 15px yellow, 0 0 60px 30px white; }

/* Candle flicker */
@keyframes flicker {0%,100%{opacity:1;}50%{opacity:0.6;}}
.flicker { animation: flicker 0.3s infinite; }

/* Star trail */
.starTrail { position:absolute; width:5px; height:5px; border-radius:50%; background: rgba(255,255,255,0.7); box-shadow:0 0 10px 2px white; pointer-events:none; }
</style>
</head>
<body>

<!-- Screen 1: Characters -->
<div id="screen1" class="screen active">
  <h1>✨ Happy Birthday Sara! ✨</h1>
  <div class="characters">
    <img src="images/cinnamoroll1.jpeg">
    <img src="images/cinnamoroll2.jpeg">
    <img src="images/cinnamoroll3.jpeg">
    <img src="images/cinnamoroll4.jpeg">
  </div>
  <button onclick="nextScreen(2)">Tap to Start 🎀</button>
</div>

<!-- Screen 2: Messages -->
<div id="screen2" class="screen">
  <h1>🎉 Messages for you 🎉</h1>
  <p id="messageText">Get ready for a surprise...</p>
  <button onclick="showNextMessage()">Next</button>
</div>

<!-- Screen 3: Cake + dessert -->
<div id="screen3" class="screen">
  <h1>Make a wish 🎂✨</h1>
  <div class="cake-container">
    <div style="position:relative;" onclick="blowCandle()">
      <img src="images/cake.jpeg">
      <div id="candles" class="flicker">🔥🔥🔥</div>
    </div>
    <img src="images/dessert.jpeg">
  </div>
  <p>(Tap the cake to blow candles)</p>
</div>

<!-- Screen 4: Wish input -->
<div id="screen4" class="screen">
  <h1>Type your wish 🌠</h1>
  <input type="text" id="wishInput" placeholder="Your wish here">
  <button onclick="shootStar()">Send Wish ✨</button>
  <div id="shootingStar"></div>
</div>

<!-- Screen 5: Final hearts -->
<div id="screen5" class="screen">
  <h1>💖 All the love to you, Sara! 💖</h1>
  <p>Hope your birthday is as magical as you are! 🎀</p>
</div>

<script>
let currentScreen = 1;
let messages = ["You’re amazing!", "Hope your day is full of smiles 😊", "Here’s to a magical year ahead ✨"];
let msgIndex = 0;

function nextScreen(screenNum){
  document.getElementById('screen'+currentScreen).classList.remove('active');
  currentScreen = screenNum;
  document.getElementById('screen'+currentScreen).classList.add('active');
}

function showNextMessage(){
  if(msgIndex < messages.length){
    document.getElementById('messageText').innerText = messages[msgIndex];
    msgIndex++;
  } else { nextScreen(3); }
}

// Cake candle
function blowCandle(){
  document.getElementById('candles').style.display='none';
  setTimeout(()=>{ nextScreen(4); },1000);
}

// Shooting star with trail
function shootStar(){
  let star = document.getElementById('shootingStar');
  star.style.display='block';
  star.style.left='0px';
  star.style.top=Math.random()*window.innerHeight/2+'px';
  let pos = 0;
  let trailInterval;
  let interval = setInterval(()=>{
    if(pos>window.innerWidth){
      clearInterval(interval);
      clearInterval(trailInterval);
      star.style.display='none';
      nextScreen(5);
      createHearts();
    } else{
      pos+=20;
      star.style.left=pos+'px';
      star.style.top=parseFloat(star.style.top) + Math.sin(pos/20)*10+'px';
      // Trail
      let trail = document.createElement('div');
      trail.className='starTrail';
      trail.style.left=(pos-15)+'px';
      trail.style.top=star.style.top;
      document.body.appendChild(trail);
      setTimeout(()=>{ trail.remove(); },500);
    }
  },20);
}

// Hearts
function createHearts(){
  for(let i=0;i<50;i++){
    let heart=document.createElement('div');
    heart.className='heart';
    heart.style.left=Math.random()*window.innerWidth+'px';
    heart.style.animationDuration=(2+Math.random()*3)+'s';
    document.body.appendChild(heart);
  }
}
</script>
</body>
</html>
